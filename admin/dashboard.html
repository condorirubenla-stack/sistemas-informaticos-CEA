<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduConnect Ruben - Panel de Administrador</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <header class="navbar">
        <div class="logo">
            <img src="../images/logo.png" alt="EduConnect Logo" class="logo-img"
                onerror="this.src='https://placehold.co/200x80/34495e/FFF?text=EduConnect'">
        </div>
        <nav class="nav-links">
            <span>Administrador</span>
            <a href="#" onclick="logout()" class="btn-login" style="background-color: #e74c3c;">Cerrar Sesión</a>
        </nav>
    </header>

    <main style="padding: 2rem; max-width: 1200px; margin: auto;">
        <h2>Gestión de Módulos</h2>
        <div
            style="margin-top: 1.5rem; background: var(--card-bg); padding: 2rem; border-radius: 12px; box-shadow: var(--shadow);">
            <p>Aquí puedes crear y visualizar los módulos actuales desde tu base de datos centralizada.</p>
            <button class="btn-login" style="margin-top: 1rem;" onclick="mostrarModalModulo()">+ Nuevo Módulo</button>
            <br><br>
            <div class="table-container">
                <table style="width: 100%; border-collapse: collapse; margin-top: 1rem;">
                    <tr style="background-color: #f2f2f2; text-align: left;">
                        <th style="padding: 10px; border: 1px solid #ddd;">ID</th>
                        <th style="padding: 10px; border: 1px solid #ddd;">Nombre</th>
                        <th style="padding: 10px; border: 1px solid #ddd;">Nivel</th>
                        <th style="padding: 10px; border: 1px solid #ddd;">Acciones</th>
                    </tr>
                    <tbody id="tabla-modulos">
                        <!-- Dynamic modules will appear here -->
                    </tbody>
                </table>
            </div>
        </div>

        <h2 style="margin-top: 2rem;">Seguimiento de Estudiantes</h2>
        <div
            style="margin-top: 1.5rem; background: var(--card-bg); padding: 2rem; border-radius: 12px; box-shadow: var(--shadow);">
            <p>Aquí se mostrará el reporte de notas y progreso (Etapa 2).</p>
        </div>

        <!-- Modal para editar contenido -->
        <div id="modal-contenido"
            style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
            <div style="background: white; padding: 2rem; border-radius: 12px; width: 500px; max-width: 90%;">
                <h3 id="modal-titulo">Editar Contenido del Módulo</h3>
                <div id="modal-body" style="margin-top: 1rem; max-height: 400px; overflow-y: auto; text-align: left;">
                    <!-- Los campos dinámicos irán aquí -->
                </div>
                <div style="margin-top: 1.5rem; text-align: right;">
                    <button class="btn-login" style="background-color: #95a5a6; margin-right: 10px;"
                        onclick="cerrarModal()">Cerrar</button>
                    <button class="btn-login" onclick="guardarContenidos()">Guardar URLs</button>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/api.js"></script>
    <script src="../js/admin.js"></script>
    <script>
        function logout() {
            localStorage.removeItem("token");
            localStorage.removeItem("user");
            window.location.href = "../index.html";
        }
    </script>
</body>

</html>
