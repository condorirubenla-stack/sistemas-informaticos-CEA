<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduConnect Ruben - Mi Panel</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .progress-bar {
            width: 100%;
            background-color: #ddd;
            border-radius: 8px;
            margin-top: 5px;
        }

        .progress-fill {
            height: 10px;
            background-color: var(--secondary-color);
            border-radius: 8px;
            width: 0%;
            transition: width 0.5s ease;
        }
    </style>
</head>

<body>
    <header class="navbar">
        <div class="logo">
            <img src="../images/logo.png" alt="EduConnect Logo" class="logo-img"
                onerror="this.src='https://placehold.co/200x80/34495e/FFF?text=EduConnect'">
        </div>
        <nav class="nav-links">
            <span>Estudiante</span>
            <a href="#" onclick="logout()" class="btn-login" style="background-color: #e74c3c;">Cerrar Sesión</a>
        </nav>
    </header>

    <main style="padding: 2rem; max-width: 1200px; margin: auto;">
        <h2>Mis Módulos</h2>

        <div
            style="margin-top: 1.5rem; background: var(--card-bg); padding: 2rem; border-radius: 12px; box-shadow: var(--shadow);">

            <div class="level-container">
                <div class="level-header">
                    <h3>Nivel Técnico Básico</h3>
                </div>
                <div class="modules-grid">

                    <div class="module-card">
                        <img src="https://placehold.co/300x160/34495e/FFF?text=Taller+Sistemas+I" alt="Module">
                        <div class="module-info">
                            <h3>Módulo 1</h3>
                            <p>Taller de Sistemas Operativos I</p>
                            <p
                                style="font-size: 0.85rem; color: var(--secondary-color); font-weight: bold; margin-top: 0.5rem;">
                                Estado: Completado</p>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: 100%;"></div>
                            </div>
                            <button class="btn-login" style="margin-top: 1rem; width: 100%; text-align: center;">Ver
                                Contenido</button>
                        </div>
                    </div>

                    <div class="module-card">
                        <img src="https://placehold.co/300x160/34495e/FFF?text=Matematica" alt="Module">
                        <div class="module-info">
                            <h3>Módulo 2</h3>
                            <p>Matemática para la Informática</p>
                            <p style="font-size: 0.85rem; color: #f39c12; font-weight: bold; margin-top: 0.5rem;">
                                Estado: En Progreso (50%)</p>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: 50%;"></div>
                            </div>
                            <button class="btn-login"
                                style="margin-top: 1rem; width: 100%; text-align: center;">Continuar</button>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <script>
        function logout() {
            localStorage.removeItem("token");
            localStorage.removeItem("user");
            window.location.href = "../index.html";
        }
    </script>
</body>

</html>
